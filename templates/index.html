<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireline — Chat</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ===================== JOIN SCREEN ===================== -->
<div id="join-screen" class="screen">
  <div class="join-card">
    <div class="brand">
      <span class="brand-mark">))) </span><span class="brand-name">WIRELINE</span>
    </div>
    <p class="brand-tagline">a small room for talk, files, voice &amp; video</p>

    <label class="field-label" for="username-input">Callsign</label>
    <input id="username-input" class="field-input" type="text" placeholder="e.g. atlas" maxlength="20" autocomplete="off">

    <label class="field-label" for="room-input">Channel</label>
    <input id="room-input" class="field-input" type="text" placeholder="e.g. lounge" maxlength="30" autocomplete="off">

    <button id="join-btn" class="btn btn-primary btn-block">Open channel</button>
    <p id="join-error" class="join-error"></p>
  </div>
</div>

<!-- ===================== APP SCREEN ===================== -->
<div id="app-screen" class="screen hidden">

  <aside class="sidebar">
    <div class="sidebar-top">
      <span class="brand-mark small">)))</span>
      <div class="room-info">
        <div class="room-name" id="room-name-label">—</div>
        <div class="room-sub">channel</div>
      </div>
    </div>

    <div class="sidebar-section-label">On this channel</div>
    <ul id="user-list" class="user-list"></ul>

    <div class="sidebar-bottom">
      <div class="me-row">
        <span class="signal-dot on"></span>
        <span id="me-label" class="me-label">—</span>
      </div>
      <button id="leave-btn" class="btn btn-ghost btn-block small">Leave channel</button>
    </div>
  </aside>

  <main class="main-panel">

    <!-- Call bar -->
    <div class="call-bar">
      <div class="call-bar-title">
        <span id="call-bar-room">—</span>
      </div>
      <div class="call-bar-actions">
        <button id="voice-call-btn" class="btn btn-outline small">
          <span class="ico">&#9742;</span> Voice
        </button>
        <button id="video-call-btn" class="btn btn-outline small">
          <span class="ico">&#9737;</span> Video
        </button>
        <button id="hangup-btn" class="btn btn-danger small hidden">
          <span class="ico">&#9587;</span> Hang up
        </button>
      </div>
    </div>

    <!-- Call stage (hidden until a call starts) -->
    <div id="call-stage" class="call-stage hidden">
      <div id="video-grid" class="video-grid"></div>
      <div class="call-controls">
        <button id="toggle-mic-btn" class="btn btn-outline small">Mute mic</button>
        <button id="toggle-cam-btn" class="btn btn-outline small">Turn camera off</button>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages" class="messages"></div>

    <!-- Composer -->
    <form id="composer" class="composer">
      <button type="button" id="attach-btn" class="btn btn-icon" title="Share a file">&#128206;</button>
      <input id="file-input" type="file" class="hidden">
      <input id="message-input" class="composer-input" type="text" placeholder="Type a message…" autocomplete="off">
      <button type="submit" class="btn btn-primary">Send</button>
    </form>
    <div id="upload-progress" class="upload-progress hidden">
      <div class="upload-progress-bar" id="upload-progress-bar"></div>
      <span id="upload-progress-label">Uploading…</span>
    </div>
  </main>
</div>

<audio id="ringtone" loop>
  <!-- optional: point to a local audio file if you want a ring sound -->
</audio>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
